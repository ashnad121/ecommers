{% load static %}


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Layout</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .sidebar {
            height: 100vh;
            background: #f8f9fa;
            padding: 20px;
        }
        .menu-link {
            display: block;
            padding: 10px;
            margin-bottom: 10px;
            background: #e9ecef;
            text-decoration: none;
            color: black;
            border-radius: 5px;
        }
        .menu-link:hover {
            background: #0d6efd;
            color: white;
        }
        .card {
         height: 100%;
       }

        .card-img-top {
        height: 80%;       /* fixed height */
        object-fit: cover;   /* crop image nicely */
      }

      .card-body {
       min-height: 150px;   /* equal content height */
      }
       
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">

        <!-- LEFT MENU -->
        <div class="col-md-3 sidebar">
            <h4>Categories</h4>

            <a href="?product=t-shirt" class="menu-link">T-Shirt</a>
            <a href="?product=Pants" class="menu-link">pant</a>
            <a href="#" class="menu-link">Watch</a>
            <a href="{% url 'store' %}" class="menu-link">All</a>
        </div>

        <!-- RIGHT DISPLAY -->
        <div class="col-md-9 p-4">
            <h3>Products</h3>

            <div class="row">

                {% for product in products %}
                <div class="col-md-4 mb-3">
                    <div class="card">
                        <img src="{{ product.image.url }}" class="card-img-top">
                        <div class="card-body">
                            <h5>{{ product.product_name }}</h5>
                            <p>{{ product.description }}</p>
                            <h6>₹{{ product.price }}</h6>
                        </div>
                    </div>
                </div>
                {% endfor %}

            </div>
                <!-- Product Card -->
                
            </div>
        </div>

    </div>
</div>


</body>
</html>
