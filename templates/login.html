<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef2f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: #fff;
            padding: 30px;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .login-box h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .login-box input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
            transition: 0.3s;
        }

        .login-box input:focus {
            border-color: #28a745;
        }

        .login-box button {
            width: 100%;
            padding: 10px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 15px;
            cursor: pointer;
            margin-top: 10px;
        }

        .login-box button:hover {
            background: #218838;
        }

        .error {
            color: red;
            text-align: center;
            margin-top: 10px;
        }

        .extra {
            text-align: center;
            margin-top: 15px;
        }

        .extra a {
            text-decoration: none;
            color: #007bff;
        }

        .extra a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="login-box">
    <form method="POST">
        {% csrf_token %}

        <h2>Login</h2>

        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <div class="extra">
            <p>Don't have an account? <a href="{% url 'register' %}">register</a></p>
        </div>
    </form>
</div>

</body>
</html>
